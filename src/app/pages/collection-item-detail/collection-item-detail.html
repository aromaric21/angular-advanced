<form (submit)="submit($event)">
  <div class="form-field">
    <label for="name">Name:</label>
    <input type="text"
           id="name"
           name="name"
           [formControl]="nameFormControl"
    />
    @if (nameFormControl.invalid && (
      nameFormControl.touched || nameFormControl.dirty
    )){
      <div class="error">This field is required!</div>
    }
  </div>
  <div class="form-field">
    <label for="price">price:</label>
    <input type="number"
           id="price"
           name="price"
           [formControl]="priceFormControl"
    />
    @if (priceFormControl.invalid && (
      priceFormControl.touched || priceFormControl.dirty
    )){
      <div class="error">This field is required!</div>
    }
  </div>
  <button
    type="submit"
    [disabled]="nameFormControl.invalid || priceFormControl.invalid"
  >Submit
  </button>
</form>
